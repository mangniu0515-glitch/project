<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
        }
        
        #qrcode img, #qrcode canvas {
            max-width: 100%;
            height: auto;
        }
        
        .placeholder {
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        
        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
        }
        
        .tips h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .tips ul {
            margin-left: 20px;
        }
        
        .tips li {
            margin-bottom: 5px;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 二维码测试页面</h1>
        
        <div class="success-message" id="successMessage">
            ✨ 二维码已更新！
        </div>
        
        <div class="input-group">
            <label for="content">输入二维码内容：</label>
            <textarea id="content" placeholder="输入你想要编码的文本、URL或其他内容...">https://www.example.com</textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="generateQR()">生成二维码</button>
            <button class="btn-secondary" onclick="clearQR()">清空</button>
        </div>
        
        <div id="qrcode">
            <div class="placeholder">
                <p>📦 点击"生成二维码"按钮</p>
                <p>即可生成测试二维码</p>
            </div>
        </div>
        
        <div class="tips">
            <h3>💡 使用说明</h3>
            <ul>
                <li>在文本框中输入任意内容</li>
                <li>点击"生成二维码"按钮生成二维码</li>
                <li>使用 <strong>二维码采集器插件</strong> 扫描测试</li>
                <li>建议输入不同类型内容：URL、文本、数字等</li>
            </ul>
        </div>
    </div>
    
    <script>
        let qrInstance = null;
        
        function generateQR() {
            const content = document.getElementById('content').value.trim();
            
            if (!content) {
                alert('请输入二维码内容');
                return;
            }
            
            const qrcodeDiv = document.getElementById('qrcode');
            
            // 清除旧的二维码
            qrcodeDiv.innerHTML = '';
            
            // 生成新的二维码
            qrInstance = new QRCode(qrcodeDiv, {
                text: content,
                width: 256,
                height: 256,
                colorDark: '#333333',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // 显示成功消息
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 2000);
        }
        
        function clearQR() {
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = `
                <div class="placeholder">
                    <p>📦 点击"生成二维码"按钮</p>
                    <p>即可生成测试二维码</p>
                </div>
            `;
            document.getElementById('content').value = '';
            qrInstance = null;
        }
        
        // 页面加载时自动生成一个二维码
        window.onload = function() {
            generateQR();
        };
    </script>
</body>
</html>
