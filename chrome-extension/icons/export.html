<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Icon Exporter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: #1a1a1a;
      color: white;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .icon-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .icon-item {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .icon-item h3 {
      margin: 15px 0 10px;
      font-weight: 500;
    }
    .icon-item p {
      color: #888;
      font-size: 14px;
      margin: 0 0 15px;
    }
    button {
      background: #007AFF;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover {
      background: #0066DD;
    }
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <h1>QR Collector Icon Exporter</h1>
  
  <div class="icon-grid">
    <div class="icon-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" id="svg16">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="3" y="14" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="14" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
      </svg>
      <h3>icon16.png</h3>
      <p>16×16 pixels</p>
      <button onclick="downloadPNG('svg16', 16, 'icon16.png')">Download</button>
    </div>
    
    <div class="icon-item">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" id="svg48">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="3" y="14" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="14" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
      </svg>
      <h3>icon48.png</h3>
      <p>48×48 pixels</p>
      <button onclick="downloadPNG('svg48', 48, 'icon48.png')">Download</button>
    </div>
    
    <div class="icon-item">
      <svg width="128" height="128" viewBox="0 0 24 24" fill="none" id="svg128">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="3" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="3" y="14" width="7" height="7" rx="1" fill="#007AFF"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="14" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="14" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
        <rect x="18" y="18" width="3" height="3" rx="0.5" fill="#1d1d1f"/>
      </svg>
      <h3>icon128.png</h3>
      <p>128×128 pixels</p>
      <button onclick="downloadPNG('svg128', 128, 'icon128.png')">Download</button>
    </div>
  </div>
  
  <div style="text-align: center; margin-top: 40px; color: #666;">
    <p>下载后请将文件保存到 chrome-extension/icons/ 目录</p>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    function downloadPNG(svgId, size, filename) {
      const svg = document.getElementById(svgId);
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = size;
      canvas.height = size;
      
      const data = new XMLSerializer().serializeToString(svg);
      const img = new Image();
      const svgBlob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(svgBlob);
      
      img.onload = function() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        
        canvas.toBlob(function(blob) {
          const link = document.createElement('a');
          link.download = filename;
          link.href = URL.createObjectURL(blob);
          link.click();
          URL.revokeObjectURL(link.href);
        }, 'image/png');
      };
      
      img.src = url;
    }
  </script>
</body>
</html>
